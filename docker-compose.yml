# Despliegue de producción bajo prasoft.es/fisgon (sin subdominio propio),
# enganchado a la red Traefik ya existente en el VPS de prasoft.es
# (ver DEPLOY-README.md de ese repo).
#
# Requiere un archivo .env (no versionado) con al menos:
#   OPENCODE_API_KEY=...
#   FISGON_JWT_SECRET=...
version: '3.8'

networks:
  traefik:
    name: prasoft_traefik
    external: true
  fisgon-net:
    name: fisgon_internal

volumes:
  fisgon-data:

services:
  fisgon-backend:
    build: ./backend
    container_name: fisgon-backend
    restart: unless-stopped
    networks:
      - fisgon-net
    volumes:
      - fisgon-data:/data
    environment:
      - LLM_PROVIDER=opencode
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - OPENCODE_MODEL=${OPENCODE_MODEL:-deepseek-v4-flash}
      - JWT_SECRET=${FISGON_JWT_SECRET}
      - INTERESTING_THRESHOLD=${FISGON_INTERESTING_THRESHOLD:-6}
      - POLL_MINUTES=${FISGON_POLL_MINUTES:-20}
      # Correo saliente (verificación de cuenta y reseteo de contraseña)
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - APP_BASE_URL=${APP_BASE_URL:-https://prasoft.es/fisgon}

  fisgon-frontend:
    build: ./frontend
    container_name: fisgon-frontend
    restart: unless-stopped
    depends_on:
      - fisgon-backend
    networks:
      - traefik
      - fisgon-net
    labels:
      - "traefik.enable=true"
      # Mismo host que el sitio principal + prefijo de ruta; prioridad explícita
      # para que gane a la regla más genérica de prasoft-web.
      - "traefik.http.routers.fisgon.rule=Host(`prasoft.es`) && PathPrefix(`/fisgon`)"
      - "traefik.http.routers.fisgon.priority=100"
      - "traefik.http.routers.fisgon.entrypoints=web,websecure"
      - "traefik.http.routers.fisgon.tls=true"
      - "traefik.http.routers.fisgon.tls.certresolver=letsencrypt"
      - "traefik.http.services.fisgon.loadbalancer.server.port=80"

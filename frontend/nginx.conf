server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # nginx absolutiza el Location de cualquier redirect con $scheme/$host
    # internos (http, sin puerto) salvo que se desactive explícitamente. Detrás
    # de Traefik eso degradaría https://prasoft.es/fisgon a
    # http://prasoft.es/fisgon/. Con esto, el Location es relativo y el
    # navegador lo resuelve contra el origen real (esquema/host/puerto) por el
    # que llegó.
    absolute_redirect off;

    location = /fisgon {
        return 301 /fisgon/;
    }

    location /fisgon/api/ {
        rewrite ^/fisgon/api/(.*)$ /api/$1 break;
        proxy_pass http://fisgon-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /fisgon/ {
        try_files $uri $uri/ /fisgon/index.html;
    }
}
